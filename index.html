                                        ...data.config,
                                        ...prev,
                                        opinetApiKey: (prev.opinetApiKey || data.config.opinetApiKey || '').trim()
                                    }
                                    : {
                                        ...prev,
                                        ...data.config,
                                        opinetApiKey: (data.config.opinetApiKey || '').trim()
                                    }
                                );
                            }
                            if (Array.isArray(data.destinations)) setDestinations(data.destinations);
                            if (data.prices) {
                                setPrices(prev => ({
                                    ...prev,
                                    ...data.prices,
                                    history: normalizeAndPruneHistory(
                                        mergeHistoryMaps(prev.history || {}, data.prices.history || {}),
                                        60
                                    )
                                }));
                            }
                        }
                    } catch (err) {
                        console.error("Cloud load failed:", err);
                        setCloudEnabled(false);
                    } finally {
                        setCloudReady(true);
                    }
                };
                loadCloudData();
            }, [hasLocalBackup]);

            useEffect(() => {
                if (!isAdmin && activeTab !== 'claim') {
                    setActiveTab('claim');
                }
            }, [isAdmin, activeTab]);

            useEffect(() => {
                if (!isAdmin) return;
                const today = getTodayKey();
                if (autoSyncDayRef.current === today) return;

                const missingRegions = getMissingRegionsForToday(prices.history || {});
                if (missingRegions.length === 0) {
                    autoSyncDayRef.current = today;
                    setSyncState(prev => ({ ...prev, status: '오늘 데이터 존재 (자동갱신 생략)', error: null }));
                    return;
                }

                autoSyncDayRef.current = today;
                runGlobalSync(config, {
                    allRegions: false,
                    targetRegions: missingRegions
                });
            }, [isAdmin, prices.history, config]);

            useEffect(() => {
                try { localStorage.setItem(LOCAL_CONFIG_KEY, JSON.stringify(config)); } catch {}
            }, [config]);
            useEffect(() => {
                try { localStorage.setItem(LOCAL_DESTINATIONS_KEY, JSON.stringify(destinations)); } catch {}
            }, [destinations]);
            useEffect(() => {
                try { localStorage.setItem(LOCAL_PRICES_KEY, JSON.stringify(prices)); } catch {}
            }, [prices]);

            useEffect(() => {
                if (!cloudReady) return;
                if (!cloudEnabled) return;
                const timer = setTimeout(async () => {
                    try {
                        const cloudApi = await getCloudApi();
                        await cloudApi.setDoc(cloudApi.docRef, {
                            config,
                            destinations,
                            prices,
                            updatedAt: cloudApi.serverTimestamp()
                        }, { merge: true });
                    } catch (err) {
                        console.error("Cloud save failed:", err);
                        setCloudEnabled(false);
                    }
                }, 500);
                return () => clearTimeout(timer);
                }, [config, destinations, prices, cloudReady, cloudEnabled]);

            const cloudState = !cloudReady
                ? { text: '확인 중', dot: 'bg-amber-500' }
                : (cloudEnabled ? { text: '정상', dot: 'bg-emerald-500' } : { text: '오류', dot: 'bg-rose-500' });

            return (
                <div className="min-h-screen text-slate-800 pb-20">
                    <Header
                        activeTab={activeTab}
                        setActiveTab={setActiveTab}
                        isAdmin={isAdmin}
                        onOpenAdmin={handleOpenAdmin}
                        onExitAdmin={handleExitAdmin}
                        cloudState={cloudState}
                    />
                    <main className="container mx-auto px-4 py-8">
                        {activeTab === 'claim' && <ClaimForm config={config} destinations={destinations} prices={prices} />}
                        {isAdmin && activeTab === 'distances' && <DistanceManager destinations={destinations} setDestinations={setDestinations} />}
                        {isAdmin && activeTab === 'prices' && <FuelPrices config={config} prices={prices} setPrices={setPrices} syncState={syncState} onRefresh={runGlobalSync} />}
                        {isAdmin && activeTab === 'settings' && (
                            <SettingsPanel
                                config={config}
                                setConfig={setConfig}
                                connectionState={connectionState}
                                onSaveApiKey={handleSaveApiKey}
                                onCheckConnection={handleCheckConnection}
                                onSaveSettings={forceSaveSettings}
                            />
                        )}
                    </main>
                    {showAdminPrompt && (
                        <div className="fixed inset-0 z-[100] bg-black/40 flex items-center justify-center px-4">
                            <div className="w-full max-w-sm bg-white rounded-2xl border border-slate-200 shadow-xl p-6">
                                <h3 className="text-lg font-bold text-slate-800 mb-3">관리자 모드 접속</h3>
                                <input
                                    type="password"
                                    value={adminPassword}
                                    onChange={(e) => setAdminPassword(e.target.value)}
                                    onKeyDown={(e) => { if (e.key === 'Enter') handleLoginAdmin(); }}
                                    placeholder="비밀번호 입력"
                                    className="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-200 focus:border-primary-500 outline-none"
                                    autoFocus
                                />
                                {adminError && <p className="mt-2 text-sm text-rose-600">{adminError}</p>}
                                <div className="mt-4 flex justify-end gap-2">
                                    <button onClick={() => setShowAdminPrompt(false)} className="px-4 py-2 rounded-lg border border-slate-300 text-slate-600">취소</button>
                                    <button onClick={handleLoginAdmin} className="px-4 py-2 rounded-lg bg-slate-800 text-white font-semibold">접속</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
